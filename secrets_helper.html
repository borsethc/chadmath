<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, system-ui; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f7; }
  .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  h2 { margin-top: 0; color: #1d1d1f; }
  label { font-weight: bold; display: block; margin-bottom: 8px; color: #0066cc; }
  textarea { width: 100%; height: 60px; margin-bottom: 10px; border: 1px solid #d2d2d7; border-radius: 6px; padding: 8px; font-family: monospace; resize: vertical; }
  button { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  button:hover { background: #0055aa; }
</style>
</head>
<body>
  <h1>GitHub Secrets Helper</h1>
  <p>Copy each of these directly into your GitHub Secrets page.</p>

  <div class="card">
    <label>APP_STORE_CONNECT_API_KEY_ISSUER_ID</label>
    <textarea id="s1" readonly>508bc2f6-d89f-47e0-9567-3bbf75a12348</textarea>
    <button onclick="copy('s1')">Copy Secret</button>
  </div>

  <div class="card">
    <label>APP_STORE_CONNECT_API_KEY_KEY_ID</label>
    <textarea id="s2" readonly>GKXGZ2JL8H</textarea>
    <button onclick="copy('s2')">Copy Secret</button>
  </div>

  <div class="card">
    <label>APP_STORE_CONNECT_API_KEY_KEY</label>
    <textarea id="s3" readonly></textarea>
    <button onclick="copy('s3')">Copy Secret</button>
  </div>

  <div class="card">
    <label>BUILD_CERTIFICATE_BASE64</label>
    <textarea id="s4" readonly></textarea>
    <button onclick="copy('s4')">Copy Secret</button>
  </div>

  <div class="card">
    <label>BUILD_PROVISION_PROFILE_BASE64</label>
    <textarea id="s5" readonly></textarea>
    <button onclick="copy('s5')">Copy Secret</button>
  </div>

  <div class="card">
    <label>P12_PASSWORD</label>
    <textarea id="s6" readonly>1234</textarea>
    <button onclick="copy('s6')">Copy Secret</button>
  </div>

  <script>
    async function loadData() {
      document.getElementById('s3').value = await (await fetch('p8_base64.txt')).text();
      document.getElementById('s4').value = await (await fetch('p12_base64.txt')).text();
      document.getElementById('s5').value = await (await fetch('profile_base64.txt')).text();
    }
    loadData();

    function copy(id) {
      const el = document.getElementById(id);
      el.select();
      document.execCommand('copy');
      const btn = el.nextElementSibling;
      const original = btn.innerText;
      btn.innerText = 'Copied!';
      btn.style.background = '#28cd41';
      setTimeout(() => { btn.innerText = original; btn.style.background = '#0066cc'; }, 2000);
    }
  </script>
</body>
</html>
